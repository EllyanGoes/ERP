# CI mínimo: impede que erros NOVOS de TypeScript cheguem a produção.
# O next.config ignora TS/lint no build da Vercel, então este workflow é a
# única barreira. O baseline são os erros pré-existentes conhecidos — quando
# zerar, remova o baseline e o ignoreBuildErrors do next.config.mjs.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências (gera o Prisma Client no postinstall)
        run: npm ci

      - name: Type-check (bloqueia erros novos acima do baseline)
        run: |
          BASELINE=8
          ERROS=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || true)
          echo "Erros de tipo: $ERROS (baseline permitido: $BASELINE)"
          if [ "$ERROS" -gt "$BASELINE" ]; then
            echo "::error::Erros de tipo acima do baseline — veja a saída do tsc abaixo"
            npx tsc --noEmit 2>&1 | grep "error TS" || true
            exit 1
          fi

      - name: Lint (informativo — não bloqueia por enquanto)
        continue-on-error: true
        run: npx next lint
